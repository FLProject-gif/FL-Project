<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="styles.css" />
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--pwb-cloud); }
  a { color: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="parts-top.jsx"></script>
<script type="text/babel" src="parts-bottom.jsx"></script>
<script type="text/babel">
  function App() {
    useLucide();
    const onRegister = () => { window.location.href = "daftar.html"; };
    return (
      <div>
        <LNav onRegister={onRegister} />
        <LHero onRegister={onRegister} />
        <LMarquee />
        <LTantangan />
        <LKenapaHadir />
        <LTemaAcara />
        <LSpeakers />
        <LSponsors onRegister={onRegister} />
        <LKolaborasi />
        <LGaleri />
        <LVenue />
        <LCTA onRegister={onRegister} />
        <LFooter />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  const draw = () => window.lucide && window.lucide.createIcons();
  setTimeout(draw, 120); setTimeout(draw, 400); setTimeout(draw, 900);
</script>
