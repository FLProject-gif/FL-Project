<!-- @dsCard group="Registration" viewport="1120x760" name="Ticket Registration Flow" subtitle="3-step free-ticket flow → e-ticket with QR" -->
<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Daftar — Pesta Wirausaha Planet Bekasi 2026</title>
<link rel="stylesheet" href="styles.css" />
<style> body { margin: 0; background: var(--pwb-cloud); } </style>
</head>
<body>
<!-- Hidden form so Netlify detects it at build time (React renders the real flow) -->
<form name="pwb-registration" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="text" name="nama" />
  <input type="email" name="email" />
  <input type="text" name="wa" />
  <input type="text" name="usaha" />
  <input type="text" name="ticket" />
  <input type="text" name="sessions" />
</form>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="registration-app.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("root")).render(<RegistrationApp />);
  const draw = () => window.lucide && window.lucide.createIcons();
  setTimeout(draw, 120); setTimeout(draw, 400); setTimeout(draw, 900);
</script>
</body>
</html>
